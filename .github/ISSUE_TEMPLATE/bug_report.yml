name: Bug Report
description: Report a bug in Buoy
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Buoy version
      description: Output of `buoy --version`
      placeholder: e.g. buoy 0.13.1
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Host OS
      description: The operating system you're running Buoy on
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: dropdown
    id: arch
    attributes:
      label: Host architecture
      description: The CPU architecture you're running Buoy on
      options:
        - ARM64
        - x86_64
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Target platform (--target)
      description: Only needed if you passed --target and it differs from your host
      options:
        - Not applicable / same as host
        - arm64-darwin
        - x86_64-pc-windows
        - x86_64-linux
        - universal-darwin
      default: 0
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Code to reproduce
      description: A minimal .bui snippet that reproduces the problem, plus the exact command you ran
      render: basic
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Error / actual output
      description: The full output you got, including any diagnostic codes (e.g. E1502, W310)
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / output
      description: What you expected to happen instead
    validations:
      required: true
